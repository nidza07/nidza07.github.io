<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>ARIA notify test: explicit announcements</title>
</head>
<body>

<h1>ARIA notify test: explicit announcements</h1>

<form action="" id="chatctl">
<p>
<label for="rate">Message rate (ms) : </label>
<input type="text" id="rate" value="500">
<button type="submit" id="startstop">Start</button>
</p>
</form>

<div id="chatlog">
This is initial content.
</div>

<script type="text/javascript">

var form = document.getElementById('chatctl');
var startbtn = document.getElementById('startstop');
var ratefld = document.getElementById('rate');
var timer = null;

var msgIndex = 0;
var chatlog = document.getElementById('chatlog');

function sendChat () {
    var msg = "This is chat message number " + (++msgIndex) + '.';

    if (msgIndex % 50 == 0) chatlog.innerHTML = '';

    var p = document.createElement('p');
    p.textContent = msg;
    chatlog.appendChild(p);

    // 🔊 Explicit announcement (polite equivalent)
    if (document.ariaNotify) {
        document.ariaNotify(msg, { priority: "normal" });
    }
}

chatctl.onsubmit = function (e) {
    if (timer) {
        clearInterval(timer);
        timer = null;
        startbtn.innerHTML = 'Start';
    }
    else {
        timer = setInterval(sendChat, parseInt(ratefld.value));
        startbtn.innerHTML = 'Stop';
        chatlog.innerHTML = 'Started.\n';

        if (document.ariaNotify) {
            document.ariaNotify("Started.", { priority: "normal" });
        }
    }
    e.preventDefault();
    return false;
};

</script>

</body>
</html>
